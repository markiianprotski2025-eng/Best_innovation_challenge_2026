<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Реєстрація</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }
        .register-container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input[type="email"],
        input[type="password"],
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="email"]:focus,
        input[type="password"]:focus,
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
            font-size: 14px;
        }
        .success-message {
            background: #efe;
            color: #3c3;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #3c3;
            font-size: 14px;
        }
        .form-row {
            display: flex;
            gap: 15px;
        }
        .form-row .form-group {
            flex: 1;
        }
        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        .error-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .error-list li {
            margin: 5px 0;
            padding-left: 20px;
            position: relative;
        }
        .error-list li:before {
            content: "✕";
            position: absolute;
            left: 0;
        }
        .error-list ul {
            list-style: none;
            padding-left: 10px;
            margin: 5px 0 0 0;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h1>Створити акаунт</h1>
        
        {% if errors %}
            <div class="error-message">
                <ul class="error-list">
                    {% for field, field_errors in errors.items %}
                        <li>
                            <strong>{{ field }}:</strong>
                            {% if field_errors %}
                                <ul>
                                    {% for error in field_errors %}
                                        <li>{{ error }}</li>
                                    {% endfor %}
                                </ul>
                            {% endif %}
                        </li>
                    {% endfor %}
                </ul>
            </div>
        {% endif %}
        
        <form method="POST" novalidate>
            {% csrf_token %}

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" {% if form.email.value %}value="{{ form.email.value }}"{% endif %} required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="first_name">Ім'я:</label>
                    <input type="text" id="first_name" name="first_name" {% if form.first_name.value %}value="{{ form.first_name.value }}"{% endif %}>
                </div>

                <div class="form-group">
                    <label for="last_name">Прізвище:</label>
                    <input type="text" id="last_name" name="last_name" {% if form.last_name.value %}value="{{ form.last_name.value }}"{% endif %}>
                </div>
            </div>

            <div class="form-group">
                <label for="password">Пароль:</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="form-group">
                <label for="password_confirm">Повторіть пароль:</label>
                <input type="password" id="password_confirm" name="password_confirm" required>
            </div>

            <button type="submit">Зареєструватись</button>
        </form>

        <div class="login-link">
            Вже у вас є акаунт? <a href="{% url 'login' %}">Увійти</a>
        </div>
    </div>
</body>
</html>
